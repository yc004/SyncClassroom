name: ai-editor-codeoss-check

on:
  workflow_dispatch:
  push:
    paths:
      - "repos/ai-editor/**"
      - "repos/editor-plugin/**"
      - ".github/workflows/ai-editor-codeoss-check.yml"

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install LumeSync AI dependencies
        run: pnpm install --no-frozen-lockfile
        working-directory: repos/ai-editor/extensions/lumesync-ai

      - name: Install editor plugin dependencies
        run: pnpm install --no-frozen-lockfile
        working-directory: repos/editor-plugin

      - name: Install local AI service dependencies
        run: pnpm install --no-frozen-lockfile
        working-directory: repos/ai-editor/services/lumesync-ai-service

      - name: Build LumeSync AI extension
        run: pnpm run compile
        working-directory: repos/ai-editor/extensions/lumesync-ai

      - name: Build preview plugin
        run: pnpm run compile
        working-directory: repos/editor-plugin

      - name: Test local AI service
        run: pnpm test
        working-directory: repos/ai-editor/services/lumesync-ai-service

      - name: Bootstrap Code-OSS and apply patch set
        shell: pwsh
        working-directory: repos/ai-editor
        run: |
          ./scripts/bootstrap-code-oss.ps1 -TargetDir ./vendor/code-oss -Ref 1.110.0

      - name: Validate patch re-apply cleanliness
        shell: pwsh
        working-directory: repos/ai-editor
        run: |
          ./scripts/apply-patches.ps1 -TargetDir ./vendor/code-oss -PatchDir ./patches -DryRun

      - name: Validate built-in extension paths
        shell: pwsh
        working-directory: repos/ai-editor
        run: |
          $product = Get-Content -Raw ./config/product.lumesync.json | ConvertFrom-Json
          foreach ($ext in $product.builtInExtensions) {
            $resolved = Resolve-Path -Path (Join-Path "." $ext.path) -ErrorAction Stop
            Write-Host "[ok] built-in extension found: $($ext.name) -> $resolved"
          }
