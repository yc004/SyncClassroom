name: Build Branch Artifacts

on:
  push:
    branches:
      - feature/*
      - 'feature-*'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: false
        default: ''

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Get branch name
        id: branch
        run: |
          $branch = "${{ github.event.inputs.branch }}"
          if (-not $branch) {
            $branch = $env:GITHUB_REF -replace 'refs/heads/', ''
          }
          $branchName = $branch -replace '/', '-'
          echo "name=$branchName" >> $env:GITHUB_OUTPUT
          echo "Branch name: $branch"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install Pillow

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: python build/convert-icons.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Build verify-password.exe
        run: npm run build:verify

      - name: Build Teacher installer
        run: npm run build:teacher -- --publish never

      - name: Build Student installer
        run: npm run build:student -- --publish never

      - name: Rename installers
        run: |
          Get-ChildItem "dist/teacher/*.exe" | ForEach-Object {
            $newName = $_.Name -replace ' ', '-'
            if ($_.Name -ne $newName) { Rename-Item $_.FullName $newName }
          }
          Get-ChildItem "dist/student/*.exe" | ForEach-Object {
            $newName = $_.Name -replace ' ', '-'
            if ($_.Name -ne $newName) { Rename-Item $_.FullName $newName }
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ steps.branch.outputs.name }}
          path: |
            dist/teacher/*.exe
            dist/student/*.exe
          retention-days: 7

      - name: Build Summary
        run: |
          echo "## Build Summary" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ steps.branch.outputs.name }}" >> $env:GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "### Installers" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          Get-ChildItem "dist/teacher/*.exe" | ForEach-Object {
            $size = [math]::Round($_.Length / 1MB, 2)
            echo "- Teacher: $($_.Name) ($size MB)" >> $env:GITHUB_STEP_SUMMARY
          }
          Get-ChildItem "dist/student/*.exe" | ForEach-Object {
            $size = [math]::Round($_.Length / 1MB, 2)
            echo "- Student: $($_.Name) ($size MB)" >> $env:GITHUB_STEP_SUMMARY
          }
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "### Download Artifacts" >> $env:GITHUB_STEP_SUMMARY
          echo "The installers are available as workflow artifacts for 7 days." >> $env:GITHUB_STEP_SUMMARY
