name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install Pillow

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Update version from tag
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          Write-Host "Updating version to $version"

          $files = @("package.json", "apps/teacher/package.json", "apps/student/package.json")
          foreach ($file in $files) {
            Write-Host "Updating $file"
            $json = Get-Content $file -Raw | ConvertFrom-Json
            $json.version = $version
            $json | ConvertTo-Json -Depth 100 | Out-File $file -Encoding utf8NoBOM
          }

          # Verify versions were updated
          Write-Host "Root version: $(Get-Content package.json | ConvertFrom-Json).version"
          Write-Host "Teacher version: $(Get-Content apps/teacher/package.json | ConvertFrom-Json).version"
          Write-Host "Student version: $(Get-Content apps/student/package.json | ConvertFrom-Json).version"

      - name: Generate icons
        run: python shared/build/convert-icons.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Build verify-password.exe
        run: pnpm run build:verify

      - name: Clean dist directories
        run: |
          if (Test-Path "dist") { Remove-Item -Recurse -Force "dist" }
          New-Item -ItemType Directory -Force -Path "dist/teacher"
          New-Item -ItemType Directory -Force -Path "dist/student"

      - name: Build Teacher installer
        run: pnpm run build:teacher -- --config.electronVersion=29.4.6 --publish never

      - name: Verify Teacher installer
        run: |
          $files = Get-ChildItem "dist/teacher/*.exe"
          if ($files.Count -ne 1) {
            Write-Error "Expected 1 installer, found $($files.Count)"
            exit 1
          }
          Write-Host "Teacher installer: $($files[0].Name)"

      - name: Build Student installer
        run: pnpm run build:student -- --config.electronVersion=29.4.6 --publish never

      - name: Verify Student installer
        run: |
          $files = Get-ChildItem "dist/student/*.exe"
          if ($files.Count -ne 1) {
            Write-Error "Expected 1 installer, found $($files.Count)"
            exit 1
          }
          Write-Host "Student installer: $($files[0].Name)"

      - name: Get tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $env:GITHUB_OUTPUT

      - name: Rename installers (remove spaces for upload)
        run: |
          Write-Host "Teacher installers:"
          Get-ChildItem "dist/teacher/*.exe" | ForEach-Object {
            Write-Host "  $($_.Name)"
            $newName = $_.Name -replace ' ', '-'
            if ($_.Name -ne $newName) { Rename-Item $_.FullName $newName }
          }

          Write-Host "Student installers:"
          Get-ChildItem "dist/student/*.exe" | ForEach-Object {
            Write-Host "  $($_.Name)"
            $newName = $_.Name -replace ' ', '-'
            if ($_.Name -ne $newName) { Rename-Item $_.FullName $newName }
          }

          Write-Host "Final installers:"
          Get-ChildItem "dist/teacher/*.exe" | ForEach-Object { Write-Host "  $($_.Name)" }
          Get-ChildItem "dist/student/*.exe" | ForEach-Object { Write-Host "  $($_.Name)" }

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: SyncClassroom ${{ steps.tag.outputs.TAG }}
          tag_name: ${{ steps.tag.outputs.TAG }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.TAG, '-') }}
          body: |
            ## SyncClassroom ${{ steps.tag.outputs.TAG }}

            ### Installation

            | File | Description |
            |------|-------------|
            | `LumeSync-Teacher-Setup-*.exe` | Teacher installer, normal uninstall |
            | `LumeSync-Student-Setup-*.exe` | Student installer, requires admin password to uninstall (default: `admin123`) |

            ### Offline Install
            Both installers are fully self-contained. No internet connection required after installation.

            ### Student Notes
            - Installation requires administrator privileges
            - Automatically registers as a Windows service (auto-start on boot)
            - Uninstall requires admin password
          files: |
            dist/teacher/LumeSync-Teacher-Setup-*.exe
            dist/student/LumeSync-Student-Setup-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
