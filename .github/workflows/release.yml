name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install Pillow

      - name: Install dependencies
        run: npm ci

      - name: Update version from tag
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $json = Get-Content package.json -Raw | ConvertFrom-Json
          $json.version = $version
          $json | ConvertTo-Json -Depth 100 | Set-Content package.json -Encoding UTF8

      - name: Generate icons
        run: python shared/build/convert-icons.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Build verify-password.exe
        run: npm run build:verify

      - name: Build Teacher installer
        run: npm run build:teacher -- --publish never

      - name: Build Student installer
        run: npm run build:student -- --publish never

      - name: Build Editor installer
        run: npm run build:editor -- --publish never

      - name: Get tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $env:GITHUB_OUTPUT

      - name: Rename installers (remove spaces for upload)
        run: |
          Get-ChildItem "dist/teacher/*.exe" | ForEach-Object {
            $newName = $_.Name -replace ' ', '-'
            if ($_.Name -ne $newName) { Rename-Item $_.FullName $newName }
          }
          Get-ChildItem "dist/student/*.exe" | ForEach-Object {
            $newName = $_.Name -replace ' ', '-'
            if ($_.Name -ne $newName) { Rename-Item $_.FullName $newName }
          }
          Get-ChildItem "dist/editor/*.exe" | ForEach-Object {
            $newName = $_.Name -replace ' ', '-'
            if ($_.Name -ne $newName) { Rename-Item $_.FullName $newName }
          }

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: SyncClassroom ${{ steps.tag.outputs.TAG }}
          tag_name: ${{ steps.tag.outputs.TAG }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.TAG, '-') }}
          body: |
            ## SyncClassroom ${{ steps.tag.outputs.TAG }}

            ### Installation

            | File | Description |
            |------|-------------|
            | `LumeSync-Teacher-Setup-*.exe` | Teacher installer, normal uninstall |
            | `LumeSync-Student-Setup-*.exe` | Student installer, requires admin password to uninstall (default: `admin123`) |
            | `LumeSync-Editor-Setup-*.exe` | AI Courseware Editor installer, integrated AI assistant |

            ### Offline Install
            Both installers are fully self-contained. No internet connection required after installation.

            ### Student Notes
            - Installation requires administrator privileges
            - Automatically registers as a Windows service (auto-start on boot)
            - Uninstall requires admin password
          files: |
            dist/teacher/LumeSync-Teacher-Setup-*.exe
            dist/student/LumeSync-Student-Setup-*.exe
            dist/editor/LumeSync-Editor-Setup-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
