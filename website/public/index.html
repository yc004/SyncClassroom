<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LumeSync (萤火课堂) - 轻量化局域网 AI 互动教学平台</title>
    
    <link rel="icon" type="image/png" href="/tray-icon.png">
    <link rel="apple-touch-icon" href="/tray-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --tech-blue: #0A192F; }
        body { background-color: var(--tech-blue); color: #E2E8F0; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 10px rgba(245, 158, 11, 0.4); }
            50% { box-shadow: 0 0 25px rgba(245, 158, 11, 0.8); }
        }
        .firefly-glow { animation: glow 3s ease-in-out infinite; }
    </style>
</head>
<body class="antialiased">

    <nav class="sticky top-0 z-50 bg-[#0A192F]/90 backdrop-blur-sm border-b border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <div class="flex-shrink-0 text-amber-500 text-2xl font-bold tracking-tight firefly-glow rounded-full bg-gray-900 border border-gray-700">
                        <img src="/tray-icon.png" alt="LumeSync Logo" class="w-10 h-10 rounded-full p-1 opacity-90">
                    </div>
                    <span class="ml-3 text-white text-xl font-bold">LumeSync <span class="text-xs text-gray-400 font-normal">(萤火课堂)</span></span>
                </div>
                <div class="flex items-center space-x-2">
                    <a href="https://github.com/yc004/SyncClassroom" target="_blank" class="text-gray-400 hover:text-white transition flex items-center space-x-1.5 bg-gray-900 px-4 py-1.5 rounded-full border border-gray-700 text-sm">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.03 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"></path></svg>
                        <span>yc004/SyncClassroom</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <header class="relative bg-gray-900 border-b border-gray-800">
        <div class="max-w-7xl mx-auto px-4 py-24 sm:px-6 lg:px-8 flex flex-col items-center text-center">
            <h1 class="text-5xl md:text-6xl font-extrabold tracking-tighter text-white leading-tight">
                打破僵化广播，<span class="text-amber-500">点亮</span>互动自由
            </h1>
            <p class="mt-6 max-w-2xl text-xl text-gray-400">
                LumeSync (萤火课堂)——轻量化局域网 AI 互动教学平台。
            </p>
            
            <div id="release-loading" class="mt-12 text-sm text-amber-400 flex items-center space-x-2">
                <svg class="animate-spin h-4 w-4 text-amber-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <span id="loading-text">正在检查服务器最新版本...</span>
            </div>

            <div id="release-loaded" class="mt-12 hidden space-y-3">
                <div class="flex flex-col sm:flex-row space-y-4 sm:space-y-0 sm:space-x-4">
                    <a id="download-teacher" href="/downloads/SyncClassroom-Teacher-Latest.exe" class="firefly-glow px-8 py-3 bg-amber-500 text-gray-900 font-semibold rounded-lg hover:bg-amber-400 transition transform hover:-translate-y-1">
                        下载教师端 (最新版)
                    </a>
                    <a id="download-student" href="/downloads/SyncClassroom-Student-Latest.exe" class="px-8 py-3 bg-gray-700 text-white font-semibold rounded-lg hover:bg-gray-600 transition">
                        下载学生端 (最新版)
                    </a>
                </div>
                <div class="text-xs text-gray-500 pt-2">
                    当前服务器部署版本: <span id="latest-version" class="font-mono text-gray-300">v-.-.-</span> | 
                    更新时间: <span id="publish-date" class="font-mono text-gray-300">----/--/--</span>
                </div>
            </div>
        </div>
    </header>

    <footer class="py-12 bg-gray-950 text-center border-t border-gray-800 text-sm text-gray-600">
        <p>&copy; 2024 LumeSync 团队. 基于 MIT 协议开源.</p>
        <p class="mt-1">符合中国大学生计算机设计大赛参赛要求.</p>
        <div class="mt-4 flex justify-center space-x-4">
            <a href="https://github.com/yc004/SyncClassroom" target="_blank" class="hover:text-amber-400">项目源码</a>
            <a href="https://github.com/yc004/SyncClassroom/issues" target="_blank" class="hover:text-amber-400">问题反馈</a>
        </div>
    </footer>

    <script>
        const LOCAL_VERSION_API = '/downloads/version.json';
        const elVersion = document.getElementById('latest-version');
        const elPublishDate = document.getElementById('publish-date');
        const elLoading = document.getElementById('release-loading');
        const elLoaded = document.getElementById('release-loaded');
        const elLoadingText = document.getElementById('loading-text');

        async function fetchLocalReleaseStatus() {
            try {
                const response = await fetch(`${LOCAL_VERSION_API}?t=${new Date().getTime()}`);
                if (!response.ok) throw new Error('尚未生成版本信息');
                
                const data = await response.json();
                
                elVersion.innerText = data.version;
                elPublishDate.innerText = new Date(data.date).toISOString().split('T')[0];

                elLoading.classList.add('hidden');
                elLoaded.classList.remove('hidden');

            } catch (error) {
                console.error('获取版本失败:', error);
                elLoadingText.innerText = '服务器版本库初始化中，请稍后刷新或直接点击下载尝试。';
                elLoaded.classList.remove('hidden');
            }
        }

        window.addEventListener('load', fetchLocalReleaseStatus);
    </script>
</body>
</html>
