<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库文件处理器 - 测试工具</title>
    <script src="processor.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-center">
            <i class="fas fa-cog mr-2"></i>
            知识库文件处理器 - 测试工具
        </h1>

        <!-- 文件上传区域 -->
        <div class="bg-slate-800 rounded-xl p-6 mb-6">
            <h2 class="text-xl font-bold mb-4">1. 上传测试文件</h2>
            <div class="border-2 border-dashed border-slate-600 rounded-lg p-8 text-center">
                <input
                    type="file"
                    id="fileInput"
                    multiple
                    accept=".txt,.md,.markdown,.json"
                    class="hidden"
                    onchange="handleFileUpload(event)"
                />
                <div class="flex flex-col items-center gap-4">
                    <div class="w-16 h-16 rounded-full bg-slate-700 flex items-center justify-center">
                        <i class="fas fa-upload text-3xl text-blue-400"></i>
                    </div>
                    <button
                        onclick="document.getElementById('fileInput').click()"
                        class="px-6 py-3 bg-blue-600 hover:bg-blue-500 rounded-lg transition-colors font-bold"
                    >
                        选择文件
                    </button>
                    <p class="text-slate-400 text-sm">支持 TXT、Markdown、JSON 格式</p>
                </div>
            </div>
        </div>

        <!-- 处理结果区域 -->
        <div id="results" class="bg-slate-800 rounded-xl p-6 mb-6 hidden">
            <h2 class="text-xl font-bold mb-4">2. 处理结果</h2>
            <div id="resultSummary" class="bg-slate-700 rounded-lg p-4 mb-4"></div>
            <div id="chunkList" class="space-y-4"></div>
        </div>

        <!-- 检索测试区域 -->
        <div class="bg-slate-800 rounded-xl p-6 hidden" id="searchSection">
            <h2 class="text-xl font-bold mb-4">3. 检索测试</h2>
            <div class="flex gap-2 mb-4">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="输入检索关键词..."
                    class="flex-1 px-4 py-2 bg-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
                <button
                    onclick="handleSearch()"
                    class="px-6 py-2 bg-green-600 hover:bg-green-500 rounded-lg transition-colors font-bold"
                >
                    检索
                </button>
            </div>
            <div id="searchResults" class="space-y-2"></div>
        </div>
    </div>

    <script>
        let processedChunks = [];
        const processor = new KnowledgeProcessor();

        async function handleFileUpload(event) {
            const files = Array.from(event.target.files);
            if (!files.length) return;

            console.log('[测试] 开始处理文件:', files.map(f => f.name));

            try {
                const result = await processor.processMultipleFiles(files, {
                    chunkSize: 800,
                    chunkOverlap: 100,
                    defaultCategory: '测试',
                    defaultTags: []
                });

                processedChunks = result.chunks;

                // 显示结果
                document.getElementById('results').classList.remove('hidden');
                document.getElementById('searchSection').classList.remove('hidden');

                // 显示摘要
                const summaryDiv = document.getElementById('resultSummary');
                summaryDiv.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="flex-1">
                            <p class="text-green-400 font-bold">✓ 处理完成</p>
                            <p class="text-sm text-slate-300">生成 ${result.chunks.length} 个知识块</p>
                        </div>
                        ${result.errors.length > 0 ? `
                            <div class="flex-1">
                                <p class="text-yellow-400 font-bold">⚠ 部分失败</p>
                                <p class="text-sm text-slate-300">${result.errors.length} 个文件处理失败</p>
                            </div>
                        ` : ''}
                    </div>
                `;

                // 显示知识块
                const chunkList = document.getElementById('chunkList');
                chunkList.innerHTML = '';

                result.chunks.forEach((chunk, index) => {
                    const chunkDiv = document.createElement('div');
                    chunkDiv.className = 'bg-slate-700 rounded-lg p-4 border-l-4 border-blue-500';
                    chunkDiv.innerHTML = `
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-xs font-bold bg-blue-600 px-2 py-1 rounded">#${index + 1}</span>
                            <h3 class="font-bold">${escapeHtml(chunk.title)}</h3>
                        </div>
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-xs bg-slate-600 px-2 py-1 rounded">${chunk.category}</span>
                            ${chunk.tags.map(tag => `<span class="text-xs bg-green-600/30 text-green-400 px-2 py-1 rounded">${escapeHtml(tag)}</span>`).join('')}
                        </div>
                        <p class="text-sm text-slate-400 mb-2">${escapeHtml(chunk.content.substring(0, 200))}${chunk.content.length > 200 ? '...' : ''}</p>
                        <div class="flex items-center gap-4 text-xs text-slate-500">
                            <span>📄 ${chunk.sourceFile}</span>
                            <span>📊 ${chunk.wordCount} 字</span>
                            <span>🏷️ ${chunk.tags.length} 标签</span>
                        </div>
                    `;
                    chunkList.appendChild(chunkDiv);
                });

                console.log('[测试] 处理成功:', result);

            } catch (error) {
                console.error('[测试] 处理失败:', error);
                alert('文件处理失败: ' + error.message);
            }

            // 重置文件输入
            event.target.value = '';
        }

        function handleSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            console.log('[测试] 检索查询:', query);

            // 简单的关键词匹配
            const keywords = query.toLowerCase().replace(/[^\w\u4e00-\u9fa5]+/g, ' ').split(' ').filter(k => k.length > 0);

            const scoredChunks = processedChunks.map(chunk => {
                const text = `${chunk.title} ${chunk.tags.join(' ')} ${chunk.content}`.toLowerCase();
                let score = 0;
                keywords.forEach(keyword => {
                    const matches = text.match(new RegExp(keyword, 'gi'));
                    if (matches) score += matches.length;
                });
                return { ...chunk, score };
            });

            const results = scoredChunks
                .filter(item => item.score > 0)
                .sort((a, b) => b.score - a.score)
                .slice(0, 5);

            const resultsDiv = document.getElementById('searchResults');
            if (results.length === 0) {
                resultsDiv.innerHTML = '<p class="text-slate-400 text-center py-4">未找到相关知识</p>';
            } else {
                resultsDiv.innerHTML = results.map((item, index) => `
                    <div class="bg-slate-700 rounded-lg p-3 border-l-4 ${index === 0 ? 'border-green-500' : 'border-slate-600'}">
                        <div class="flex items-center justify-between mb-1">
                            <h4 class="font-bold">${escapeHtml(item.title)}</h4>
                            <span class="text-xs bg-green-600/30 text-green-400 px-2 py-1 rounded">匹配度: ${item.score}</span>
                        </div>
                        <p class="text-sm text-slate-400">${escapeHtml(item.content.substring(0, 150))}...</p>
                    </div>
                `).join('');
            }

            console.log('[测试] 检索结果:', results);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 添加 FontAwesome
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css';
        document.head.appendChild(link);
    </script>
</body>
</html>
